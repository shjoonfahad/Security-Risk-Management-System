{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-head">Activity Log</div>
  <div class="table-wrap">
    <table class="table">
      <thead><tr><th>User</th><th>Action</th><th>Details</th><th>Time</th></tr></thead>
      <tbody>
        {% for log in logs %}
        <tr>
          <td>{{ log['user'] }}</td>
          <td>{{ log['action'] }}</td>
          <td>{{ log['details'] }}</td>
          <td>{{ log['timestamp'] }}</td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="muted">No activity yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
